<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Viewer - 精美 Markdown 阅读器</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-color: #1a202c;
            --text-light: #718096;
            --text-muted: #a0aec0;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: #eff6ff;
            --code-bg: #f1f5f9;
            --toc-bg: #fafbfc;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 8px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: var(--font-main);
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* ========== 整体布局 ========== */
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== TOC 侧边栏（右侧） ========== */
        .toc-sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--toc-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: margin-right var(--transition), min-width var(--transition), width var(--transition), opacity var(--transition);
            overflow: hidden;
            z-index: 10;
            order: 1;
        }
        .toc-sidebar.collapsed {
            margin-right: -280px;
            min-width: 0;
            width: 0;
            opacity: 0;
        }

        .toc-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .toc-header h3 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }
        .toc-close-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .toc-close-btn:hover {
            background: var(--border-color);
            color: var(--text-color);
        }

        .toc-list-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }
        .toc-list-wrapper::-webkit-scrollbar { width: 4px; }
        .toc-list-wrapper::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .toc-list {
            list-style: none;
        }
        .toc-item {
            display: block;
        }
        .toc-link {
            display: block;
            padding: 6px 18px;
            font-size: 13px;
            color: var(--text-light);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .toc-link:hover {
            color: var(--accent-color);
            background: var(--accent-light);
        }
        .toc-link.active {
            color: var(--accent-color);
            background: var(--accent-light);
            font-weight: 500;
            border-right: 3px solid var(--accent-color);
            padding-right: 12px;
        }

        .toc-empty {
            padding: 30px 18px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ========== TOC 悬浮开关（右侧） ========== */
        .toc-toggle-btn {
            position: fixed;
            right: 12px;
            top: 12px;
            z-index: 20;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--panel-bg);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            transition: all 0.15s;
        }
        .toc-toggle-btn:hover {
            background: var(--accent-light);
            color: var(--accent-color);
            border-color: var(--accent-color);
        }
        .toc-toggle-btn.visible { display: flex; }

        /* ========== 主内容区域 ========== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        /* ========== 顶部栏 ========== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 52px;
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg);
            flex-shrink: 0;
        }
        .app-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .app-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
        }
        .app-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .header-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: var(--accent-light);
        }
        a.header-btn {
            text-decoration: none;
        }
        .header-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        /* ========== 内容区：输入 + 预览 ========== */
        .content-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* --- 输入面板 --- */
        .input-panel {
            width: 380px;
            min-width: 300px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            transition: width var(--transition), min-width var(--transition), opacity var(--transition);
            overflow: hidden;
        }
        .input-panel.collapsed {
            width: 0;
            min-width: 0;
            opacity: 0;
            border-right: none;
        }

        .input-toolbar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            gap: 8px;
            flex-shrink: 0;
        }
        .input-toolbar h2 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            flex: 1;
        }
        .input-toolbar-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            transition: all 0.15s;
        }
        .input-toolbar-btn:hover {
            background: var(--border-color);
            color: var(--text-color);
        }

        .file-upload-area {
            margin: 12px 16px;
            padding: 24px 16px;
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .file-upload-area:hover {
            border-color: var(--accent-color);
            background: var(--accent-light);
        }
        .file-upload-area svg {
            width: 32px;
            height: 32px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .file-upload-area p {
            font-size: 13px;
            color: var(--text-light);
        }
        #file-input { display: none; }

        .input-body {
            flex: 1;
            padding: 0 16px 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #markdown-input {
            flex: 1;
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 14px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 13px;
            line-height: 1.7;
            resize: none;
            transition: border-color 0.2s;
            color: var(--text-color);
        }
        #markdown-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        #markdown-input::placeholder { color: var(--text-muted); }

        /* --- 预览面板 --- */
        .preview-panel {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px;
            background: var(--panel-bg);
            scroll-behavior: smooth;
        }
        .preview-panel::-webkit-scrollbar { width: 6px; }
        .preview-panel::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 6px; }

        #welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: var(--text-muted);
        }
        #welcome-screen svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.4; }
        #welcome-screen h2 { font-size: 20px; color: var(--text-light); font-weight: 600; }
        #welcome-screen p { max-width: 360px; margin-top: 8px; font-size: 14px; }

        #preview-content { display: none; }

        /* ========== Markdown 渲染样式 ========== */
        #preview-content {
            font-size: 15px;
            max-width: 820px;
            margin: 0 auto;
        }
        #preview-content h1, #preview-content h2, #preview-content h3,
        #preview-content h4, #preview-content h5, #preview-content h6 {
            margin-top: 28px;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.3;
            color: #1a202c;
            scroll-margin-top: 20px;
        }
        #preview-content h1 { font-size: 1.85em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        #preview-content h2 { font-size: 1.45em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        #preview-content h3 { font-size: 1.2em; }
        #preview-content h4 { font-size: 1.05em; }

        #preview-content p { margin-bottom: 14px; }

        #preview-content a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.15s;
        }
        #preview-content a:hover { border-bottom-color: var(--accent-color); }

        #preview-content ul, #preview-content ol { padding-left: 1.8em; margin-bottom: 14px; }
        #preview-content li { margin-bottom: 6px; }

        #preview-content blockquote {
            margin: 0 0 14px;
            padding: 10px 18px;
            border-left: 4px solid var(--accent-color);
            background: var(--accent-light);
            color: var(--text-light);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        #preview-content code {
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            background: #fff8e1;
            padding: 0.15em 0.4em;
            font-size: 88%;
            border-radius: 4px;
            color: #c05621;
            border: 1px solid #fef3c7;
        }

        #preview-content pre {
            margin-bottom: 14px;
            padding: 16px;
            background: #282c34;
            color: #abb2bf;
            border-radius: var(--radius);
            overflow-x: auto;
            font-size: 13.5px;
            border: 1px solid #3e4451;
        }
        #preview-content pre code {
            background: transparent;
            padding: 0;
            font-size: 100%;
            color: inherit;
            border: none;
        }

        #preview-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 14px;
        }
        #preview-content th, #preview-content td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }
        #preview-content th { background: var(--code-bg); font-weight: 600; }
        #preview-content tr:nth-child(even) { background: #f8fafc; }

        #preview-content img {
            max-width: 100%;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
        }

        #preview-content hr {
            border: none;
            height: 1px;
            background: var(--border-color);
            margin: 24px 0;
        }

        /* ========== 滚动条全局 ========== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ========== 网站访问统计 ========== */
        .site-stats-container {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            background: var(--panel-bg);
            flex-shrink: 0;
        }
        .stats-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .stats-icon {
            color: var(--accent-color);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 6px 8px;
            border-radius: var(--radius);
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .stat-item:hover {
            border-color: var(--accent-color);
            background: var(--accent-light);
        }
        .stat-label {
            font-size: 10px;
            color: var(--text-light);
        }
        .stat-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            font-family: Consolas, Monaco, monospace;
            display: inline-flex;
            align-items: center;
        }
        .stat-value .loading-dots {
            color: var(--text-muted);
            font-size: 11px;
            animation: loadingPulse 1.5s infinite;
        }
        @keyframes loadingPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
    <script src="https://cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>
</head>
<body>

    <!-- TOC 悬浮开关按钮（TOC 收起时显示，右侧） -->
    <button class="toc-toggle-btn" id="toc-toggle-btn" title="显示目录">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="15" y1="18" x2="21" y2="18"/>
        </svg>
    </button>

    <div class="app-container">
        <!-- 主区域 -->
        <div class="main-area">
            <header class="app-header">
                <div class="app-header-left">
                    <span class="app-title">MD Viewer</span>
                    <span class="app-subtitle">Markdown 阅读器</span>
                </div>
                <div class="header-actions">
                    <a class="header-btn" href="index.html" title="返回 Dev Toolbox Pro">返回工具箱</a>
                    <button class="header-btn" id="toggle-input-btn" title="切换编辑面板">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        编辑
                    </button>
                    <button class="header-btn" id="toggle-toc-btn" title="切换目录">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                        </svg>
                        目录
                    </button>
                </div>
            </header>

            <div class="content-body">
                <!-- 输入面板 -->
                <div class="input-panel" id="input-panel">
                    <div class="input-toolbar">
                        <h2>编辑</h2>
                        <button class="input-toolbar-btn" id="close-input-btn" title="收起编辑">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 18 9 12 15 6"/>
                            </svg>
                        </button>
                    </div>
                    <label for="file-input" class="file-upload-area">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                        </svg>
                        <p>点击或拖拽上传 .md 文件</p>
                    </label>
                    <input type="file" id="file-input" accept=".md, .markdown, .txt">
                    <div class="input-body">
                        <textarea id="markdown-input" placeholder="在此粘贴 Markdown 内容..."></textarea>
                    </div>
                </div>

                <!-- 预览面板 -->
                <div class="preview-panel" id="preview-panel">
                    <div id="welcome-screen">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                        </svg>
                        <h2>开始阅读</h2>
                        <p>请上传 .md 文件或粘贴 Markdown 内容，右侧将实时渲染预览。</p>
                    </div>
                    <div id="preview-content"></div>
                </div>
            </div>
        </div>

        <!-- 右侧目录 -->
        <aside class="toc-sidebar" id="toc-sidebar">
            <div class="toc-header">
                <h3>目录</h3>
                <button class="toc-close-btn" id="toc-close-btn" title="收起目录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>
            </div>
            <div class="toc-list-wrapper">
                <div class="toc-empty" id="toc-empty">暂无目录内容</div>
                <ul class="toc-list" id="toc-list"></ul>
            </div>
            
            <!-- 网站访问统计 -->
            <div class="site-stats-container">
                <div class="stats-header">
                    <svg class="stats-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    <span>访问量统计</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">今日访问</span>
                        <span class="stat-value" id="busuanzi_today_pv"><span class="loading-dots">...</span></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">今日访客</span>
                        <span class="stat-value" id="busuanzi_today_uv"><span class="loading-dots">...</span></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">本站访问</span>
                        <span class="stat-value" id="busuanzi_site_pv"><span class="loading-dots">...</span></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">本站访客</span>
                        <span class="stat-value" id="busuanzi_site_uv"><span class="loading-dots">...</span></span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const markdownInput = document.getElementById('markdown-input');
        const previewContent = document.getElementById('preview-content');
        const welcomeScreen = document.getElementById('welcome-screen');
        const tocSidebar = document.getElementById('toc-sidebar');
        const tocList = document.getElementById('toc-list');
        const tocEmpty = document.getElementById('toc-empty');
        const tocToggleBtn = document.getElementById('toc-toggle-btn');
        const tocCloseBtn = document.getElementById('toc-close-btn');
        const toggleTocBtn = document.getElementById('toggle-toc-btn');
        const toggleInputBtn = document.getElementById('toggle-input-btn');
        const closeInputBtn = document.getElementById('close-input-btn');
        const inputPanel = document.getElementById('input-panel');
        const previewPanel = document.getElementById('preview-panel');

        let tocVisible = true;
        let inputVisible = true;

        // --- marked 配置 ---
        marked.setOptions({
            gfm: true,
            breaks: true,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // --- 渲染 ---
        function renderMarkdown(text) {
            if (!text.trim()) {
                previewContent.style.display = 'none';
                welcomeScreen.style.display = 'flex';
                buildToc([]);
                return;
            }
            welcomeScreen.style.display = 'none';
            previewContent.style.display = 'block';

            const html = marked.parse(text);
            previewContent.innerHTML = html;

            previewContent.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));

            // 为标题添加 id 并构建目录
            const headings = previewContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
            const tocData = [];
            headings.forEach((h, i) => {
                const id = 'heading-' + i;
                h.id = id;
                tocData.push({
                    level: parseInt(h.tagName[1]),
                    text: h.textContent,
                    id: id
                });
            });
            buildToc(tocData);
        }

        // --- 构建目录 ---
        function buildToc(items) {
            tocList.innerHTML = '';
            if (!items.length) {
                tocEmpty.style.display = 'block';
                return;
            }
            tocEmpty.style.display = 'none';
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'toc-item';
                const a = document.createElement('a');
                a.className = 'toc-link';
                a.setAttribute('data-level', item.level);
                a.textContent = item.text;
                a.title = item.text;
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = document.getElementById(item.id);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        setActiveToc(item.id);
                    }
                });
                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // --- 高亮当前目录项 ---
        function setActiveToc(id) {
            tocList.querySelectorAll('.toc-link').forEach(link => link.classList.remove('active'));
            const links = tocList.querySelectorAll('.toc-link');
            const headings = previewContent.querySelectorAll('h1,h2,h3,h4,h5,h6');
            headings.forEach((h, i) => {
                if (h.id === id && links[i]) {
                    links[i].classList.add('active');
                }
            });
        }

        // --- 滚动监听：自动高亮目录 ---
        previewPanel.addEventListener('scroll', () => {
            const headings = previewContent.querySelectorAll('h1,h2,h3,h4,h5,h6');
            if (!headings.length) return;
            let currentId = headings[0].id;
            const scrollTop = previewPanel.scrollTop;
            headings.forEach(h => {
                if (h.offsetTop - 60 <= scrollTop) {
                    currentId = h.id;
                }
            });
            setActiveToc(currentId);
        });

        // --- TOC 展开/收起 ---
        function setTocVisible(visible) {
            tocVisible = visible;
            tocSidebar.classList.toggle('collapsed', !visible);
            tocToggleBtn.classList.toggle('visible', !visible);
            toggleTocBtn.classList.toggle('active', visible);
        }
        tocCloseBtn.addEventListener('click', () => setTocVisible(false));
        tocToggleBtn.addEventListener('click', () => setTocVisible(true));
        toggleTocBtn.addEventListener('click', () => setTocVisible(!tocVisible));

        // --- 输入面板展开/收起 ---
        function setInputVisible(visible) {
            inputVisible = visible;
            inputPanel.classList.toggle('collapsed', !visible);
            toggleInputBtn.classList.toggle('active', visible);
        }
        closeInputBtn.addEventListener('click', () => setInputVisible(false));
        toggleInputBtn.addEventListener('click', () => setInputVisible(!inputVisible));

        // --- 初始化按钮状态 ---
        setTocVisible(true);
        setInputVisible(true);

        // --- 事件：文本输入 ---
        markdownInput.addEventListener('input', () => renderMarkdown(markdownInput.value));

        // --- 事件：文件上传 ---
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    markdownInput.value = ev.target.result;
                    renderMarkdown(ev.target.result);
                };
                reader.readAsText(file);
            }
        });

        // --- 事件：拖拽 ---
        inputPanel.addEventListener('dragover', (e) => {
            e.preventDefault();
            inputPanel.style.outline = '2px dashed var(--accent-color)';
            inputPanel.style.outlineOffset = '-4px';
        });
        inputPanel.addEventListener('dragleave', (e) => {
            e.preventDefault();
            inputPanel.style.outline = 'none';
        });
        inputPanel.addEventListener('drop', (e) => {
            e.preventDefault();
            inputPanel.style.outline = 'none';
            const file = e.dataTransfer.files[0];
            if (file && (file.name.endsWith('.md') || file.name.endsWith('.markdown') || file.name.endsWith('.txt'))) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    markdownInput.value = ev.target.result;
                    renderMarkdown(ev.target.result);
                };
                reader.readAsText(file);
            } else {
                alert('请拖拽 .md, .markdown 或 .txt 格式的文件。');
            }
        });
    </script>
</body>
</html>
